name: 'GitChain Submit'
description: 'Record a git commit as an immutable transaction on the GitChain network'
author: 'GitChain'

inputs:
  private_key:
    description: 'Ed25519 private key hex (from GitHub Secrets)'
    required: true
  node_url:
    description: 'URL of a running GitChain node (e.g. http://192.168.1.10:8000)'
    required: true

runs:
  using: 'node20'
  main: 'gitchain-submit.js'
